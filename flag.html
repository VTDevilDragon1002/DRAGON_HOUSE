<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildLife Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET & BASE */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* CONTAINER */
.container{
  width:90%;
  max-width:600px;
  background:rgba(0,0,0,0.85);
  border-radius:15px;
  padding:40px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  text-align:center;
  transition: all 0.3s ease-in-out;
}

/* LOGO/HEADER */
.header{
  font-size:32px;
  font-weight:600;
  margin-bottom:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#8BC34A;
}

.header span{
  font-size:36px;
}

/* FLAG CARD */
.flag-card{
  background:linear-gradient(145deg,#111,#222);
  padding:25px;
  border-radius:12px;
  margin-top:20px;
  font-size:20px;
  color:#00ffcc;
  letter-spacing:1px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  display:none;
  animation:fadeIn 1s ease forwards;
}

/* ACCESS DENIED */
.denied{
  color:#ff5252;
  font-size:20px;
  margin-top:20px;
  font-weight:500;
  animation:fadeIn 1s ease forwards;
}

/* BUTTON */
button{
  margin-top:30px;
  padding:12px 25px;
  font-size:16px;
  font-weight:500;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover{
  background:#2e7d32;
  transform:translateY(-2px);
}

/* ANIMATION */
@keyframes fadeIn{
  0%{opacity:0; transform:translateY(-10px);}
  100%{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<div class="header">
  <span>🐾</span> WildLife Admin Panel
</div>

<p class="info-text">Welcome to the WildLife Admin Panel. Only authorized tokens can reveal the secret flag.</p>

<div id="denied" class="denied">Access Denied</div>

<div id="flag" class="flag-card">
BREACH{INTHA_AATAM_POTHUMA_KOLANTHA}
</div>

<button onclick="logout()">Back to Portal</button>

</div>

<script>
function checkAccess(){

  const params = new URLSearchParams(window.location.search);
  
  if(!params.has("token")) return;
  
  let token = params.get("token");
  
  try{
    let firstDecode = atob(token);
    let secondDecode = atob(firstDecode);
    let parts = secondDecode.split("+");
    let username = parts[1];
    
    if(username === "admin"){
      document.getElementById("denied").style.display = "none";
      document.getElementById("flag").style.display = "block";
    }
    
  }catch(e){
    console.log("Invalid token");
  }
}

function logout(){
  window.location.href = "index.html";
}

checkAccess();
</script>

</body>
</html>
