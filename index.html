<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>WildLife Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1501706362039-c6e13b3e5c5c") no-repeat center/cover;
color:white;
}

.container{
width:420px;
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,0.7);
text-align:center;
}

.logo{
font-size:28px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}

.switch{
margin-top:15px;
font-size:14px;
cursor:pointer;
color:#8BC34A;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🐾 WildLife Portal</div>

<div id="signup">

<h2>Create Account</h2>

<input type="text" id="newuser" placeholder="Username">
<input type="password" id="newpass" placeholder="Password">

<button onclick="goLogin()">Sign Up</button>

<div class="switch" onclick="goLogin()">Already have account? Login</div>

</div>

<div id="login" class="hidden">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="goSignup()">Create account</div>

</div>

</div>

<script>

function checkToken(){

const params = new URLSearchParams(window.location.search);

if(!params.has("token")) return;

let token = params.get("token");

try{

let firstDecode = atob(token);
let secondDecode = atob(firstDecode);

let parts = secondDecode.split("+");

let username = parts[1];

setTimeout(function(){

if(username === "admin"){

window.location.replace("flag.html?token=" + token);

}else{

window.location.replace("dashboard.html");

}

},3000);

}catch(e){

console.log("Invalid token");

}

}

function goLogin(){

document.getElementById("signup").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");

}

function goSignup(){

document.getElementById("login").classList.add("hidden");
document.getElementById("signup").classList.remove("hidden");

}

function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(username === "" || password === ""){

alert("Enter username and password");
return;

}

if(username === "admin"){

alert("Admin login is disabled");
return;

}

let id = Math.floor(1000 + Math.random()*9000);

let tokenData = id + "+" + username;

let first = btoa(tokenData);

let second = btoa(first);

history.pushState({}, "", "index.html?token=" + second);

setTimeout(function(){

window.location.replace("dashboard.html");

},3000);

}

checkToken();

</script>

</body>
</html>
